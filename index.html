<!DOCTYPE html>
<html>
<head>
    <title>Neumorphism Choropleth - Shadow</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Warna Dasar Neumorphism */
        :root {
            --bg-color: #e0e5ec;
            --text-main: #4a5568;
            --text-accent: #3182ce;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
        }

        body { 
            margin: 0; 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Neumorphic Header */
        .header { 
            text-align: center; 
            padding: 15px; 
            margin: 15px 20px 5px 20px;
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), 
                       -9px -9px 16px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
        
        h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            font-weight: 800;
            color: var(--text-accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        #map-container { 
            flex-grow: 1;
            position: relative; 
            margin: 15px 20px 20px 20px;
            border-radius: 20px;
            overflow: hidden;
            /* Inner shadow untuk kesan map tenggelam ke dalam layar */
            box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7),
                        inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
            border: 4px solid var(--bg-color);
        }

        #map { 
            height: 100%; 
            width: 100%; 
            background: transparent;
            z-index: 1;
        }
        
        /* Neumorphic Panel */
        .controls, .info, .legend { 
            background: var(--bg-color);
            border-radius: 15px; 
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), 
                       -6px -6px 12px rgba(255, 255, 255, 0.6);
            border: none;
            color: var(--text-main);
        }

        .controls {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
            padding: 20px; 
            width: 220px;
        }

        .control-group { margin-bottom: 18px; }
        
        .control-group label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
            color: var(--text-main);
        }
        
        select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 10px; 
            background: var(--bg-color); 
            color: var(--text-accent);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            outline: none;
            cursor: pointer;
            /* Efek input tenggelam */
            box-shadow: inset 4px 4px 6px rgba(163, 177, 198, 0.6), 
                        inset -4px -4px 6px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        select:focus {
            box-shadow: inset 6px 6px 8px rgba(163, 177, 198, 0.7), 
                        inset -6px -6px 8px rgba(255, 255, 255, 0.7);
        }

        .info { 
            padding: 15px 20px; 
            min-width: 180px; 
        }
        
        .info b { color: var(--text-accent); font-size: 1.1em; display: block; margin-bottom: 3px; font-weight: 800;}
        .info span.kab { font-size: 0.8em; color: #718096; display: block; margin-bottom: 8px;}
        .info span.val { font-size: 1.2em; font-weight: 800; color: var(--text-main); }

        .legend { 
            padding: 15px; 
            line-height: 2em; 
            font-size: 0.85rem; 
            font-weight: 600;
        }
        
        .legend strong { color: var(--text-accent); display: block; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem;}
        
        .legend i { 
            width: 20px; 
            height: 20px; 
            float: left; 
            margin-right: 12px; 
            border-radius: 50%; /* Bulat ala neumorphism */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Data Sumatera Barat</h1>
</div>

<div id="map-container">
    <div class="controls">
        <div class="control-group">
            <label>Pilih Tahun</label>
            <select id="tahunFilter" onchange="updateMap()"></select>
        </div>
        <div class="control-group">
            <label>Pilih Indikator</label>
            <select id="kategoriFilter" onchange="updateMap()">
                <option value="ipm">Indeks Pembangunan (IPM)</option>
                <option value="tpt">Pengangguran Terbuka</option>
                <option value="kemiskinan">Angka Kemiskinan</option>
                <option value="pengeluaran">Pengeluaran Kapita</option>
                <option value="hls">Harapan Lama Sekolah</option>
            </select>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
// Palet warna yang lebih lembut (Pastel) agar cocok dengan tema terang
const configs = {
    tpt: { bins:[200000, 400000, 500000, 600000, 700000], colors:['#eff3ff','#bdd7e7','#6baed6','#3182bd','#08519c'], unit:" jiwa" }, 
    kemiskinan: { bins:[300000, 400000, 500000, 600000, 700000], colors:['#fee5d9','#fcae91','#fb6a4a','#de2d26','#a50f15'], unit:" jiwa" },
    hls: { bins:[12, 13, 14, 15, 16], colors:['#f2f0f7','#cbc9e2','#9e9ac8','#756bb1','#54278f'], unit:" thn" },
    pengeluaran: { bins:[8000, 10000, 12000, 14000, 15000], colors:['#edf8b1','#7fcdbb','#41b6c4','#1d91c0','#225ea8'], unit:" rb Rp" }, 
    ipm: { bins:[65, 70, 75, 80, 83], colors:['#edf8e9','#bae4b3','#74c476','#31a354','#006d2c'], unit:"" }
};

// Peta Dasar Terang dan Bersih
var map = L.map('map', { zoomControl: false }).setView([-0.73, 100.8], 8);
L.control.zoom({ position: 'topleft' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

var csvData=[], kecGeo, layerUtama;

// Kontrol Info (Menggunakan properti NAME_2 dan NAME_3 dari GADM buatanmu)
var info = L.control({position: 'bottomleft'});
info.onAdd = function() { this._div = L.DomUtil.create('div', 'info'); this.update(); return this._div; };
info.update = function(props) {
    if (!props) { this._div.innerHTML = "<b style='color:#a0aec0'>Arahkan Kursor</b><span class='kab'>Pilih area di peta</span>"; return; }
    let kat = document.getElementById("kategoriFilter").value;
    let val = props.val ? props.val.toLocaleString('id-ID') : "N/A";
    
    // PERUBAHAN DI SINI: props.NAME_3 untuk Kecamatan, props.NAME_2 untuk Kabupaten
    this._div.innerHTML = `<b>Kec. ${props.NAME_3}</b><span class="kab">Kab/Kota ${props.NAME_2}</span><span class="val">${val} <span style="font-size:0.7em; font-weight:normal">${configs[kat].unit}</span></span>`;
};
info.addTo(map);

// Fungsi Warna
function getColor(d, cat) {
    let c = configs[cat];
    for (let i = c.bins.length - 1; i >= 0; i--) { if (d >= c.bins[i]) return c.colors[i]; }
    return c.colors[0]; 
}

// Kontrol Legenda
var legend = L.control({position: 'bottomright'});
legend.onAdd = function() { this._div = L.DomUtil.create('div', 'legend'); return this._div; };
legend.update = function(cat) {
    let c = configs[cat];
    let html = `<strong>Kategori ${cat}</strong>`;
    c.bins.forEach((b, i) => {
        html += `<i style="background:${c.colors[i]}"></i> ${b.toLocaleString('id-ID')} +<br style="clear:both">`;
    });
    this._div.innerHTML = html;
};
legend.addTo(map);

// Inisialisasi Data Utama
async function init() {
    try {
        // PERUBAHAN DI SINI: Memanggil dataset dengan nama barumu
        const resCsv = await fetch('data_sumbar_2015-2025.csv');
        csvData = Papa.parse(await resCsv.text(), {header: true, skipEmptyLines: true}).data;

        let tahun = [...new Set(csvData.map(d => d.tahun))].sort((a,b) => b-a);
        let sel = document.getElementById("tahunFilter");
        tahun.forEach(t => { sel.add(new Option(t, t)); });

        // PERUBAHAN DI SINI: Memanggil GeoJSON kecamatan buatanmu sendiri
        kecGeo = await (await fetch('kec_buatan_shadow.json')).json();
        
        updateMap();
        map.fitBounds(L.geoJson(kecGeo).getBounds());
    } catch (e) { 
        console.error(e); 
        alert("Gagal memuat data. Pastikan file data_sumbar_2015-2025.csv dan kec_buatan_shadow.json ada di folder yang sama.");
    }
}

// Update Peta
function updateMap() {
    if (layerUtama) map.removeLayer(layerUtama);

    let thn = document.getElementById("tahunFilter").value;
    let kat = document.getElementById("kategoriFilter").value;

    layerUtama = L.geoJson(kecGeo, {
        style: function(f) {
            let row = csvData.find(r => {
                if(!r.nama_kabupaten) return false;
                let nCsv = r.nama_kabupaten.toLowerCase();
                
                // PERUBAHAN DI SINI: Mencocokkan dengan properti NAME_2 dari GADM
                let nGeo = f.properties.NAME_2.toLowerCase();
                
                return (nCsv.includes(nGeo) || nGeo.includes(nCsv)) && r.tahun == thn;
            });

            let val = row ? parseFloat(row[kat]) : 0;
            f.properties.val = val; 

            return {
                fillColor: getColor(val, kat),
                weight: 0.8, 
                opacity: 1,
                color: '#ffffff', // Garis batas putih agar seolah menyatu dengan tema soft
                fillOpacity: 0.9
            };
        },
        onEachFeature: function(f, l) {
            l.on({
                mouseover: (e) => {
                    let layer = e.target;
                    layer.setStyle({ 
                        weight: 3, 
                        color: '#3182ce', // Garis highlight biru elegan
                        fillOpacity: 1 
                    });
                    layer.bringToFront();
                    info.update(f.properties);
                },
                mouseout: (e) => {
                    layerUtama.resetStyle(e.target);
                    info.update();
                }
            });
        }
    }).addTo(map);

    legend.update(kat);
}

init();
</script>
</body>
</html>
